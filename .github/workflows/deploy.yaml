name: Build and Deploy

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Build normal version
      - name: Build default
        run: |
          parcel build public/index.html \
            --no-source-maps \
            --dist-dir dist \
            --public-url ./

      # Build NO_AI version
      - name: Build no-AI version
        run: |
          NO_AI=1 parcel build public/index.html \
            --no-source-maps \
            --dist-dir dist-noai \
            --public-url ./

      # Combine outputs
      - name: Combine builds
        run: |
          mkdir final
          cp -r dist/* final/
          mkdir -p final/noai
          cp -r dist-noai/* final/noai/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
